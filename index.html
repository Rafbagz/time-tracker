<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Task - Time Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f5;
      --muted: rgba(240,240,245,0.45);
      --radius: 20px;
      --transition: 0.2s ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 28px 32px 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 16px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      white-space: nowrap;
      line-height: 1;
      justify-self: start;
    }

    .header-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .btn-end-session {
      background: none;
      border: 1px solid rgba(255,100,100,0.3);
      border-radius: 10px;
      color: rgba(255,130,130,0.55);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 8px 16px;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
      white-space: nowrap;
    }

    .btn-end-session.active {
      border-color: rgba(255,100,100,0.55);
      color: rgba(255,140,140,0.9);
    }

    .btn-end-session:hover {
      background: rgba(255,100,100,0.08);
      border-color: rgba(255,100,100,0.65);
      color: #ff9090;
    }

    .header-total {
      font-size: 0.7rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      line-height: 1.4;
      text-align: center;
      white-space: nowrap;
    }

    .header-total strong {
      display: block;
      color: rgba(240,240,245,0.4);
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    /* ── Session summary modal ── */
    .session-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(6px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .session-modal {
      background: #14141d;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      width: 100%;
      max-width: 460px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .session-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .session-modal-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .session-duration {
      font-size: 3rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #fff;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .session-duration-label {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .session-activity-count {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 6px;
    }

    .session-activity-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .session-activity-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
    }

    .session-activity-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .session-activity-name {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 500;
    }

    .session-activity-time {
      font-size: 0.88rem;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      color: #fff;
    }

    .session-modal-actions {
      display: flex;
      gap: 10px;
    }

    .btn-session-export {
      flex: 1;
      background: #6c63ff;
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 11px;
      transition: background var(--transition);
    }

    .btn-session-export:hover { background: #7c74ff; }

    .btn-session-close {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 11px 20px;
      transition: color var(--transition), border-color var(--transition);
    }

    .btn-session-close:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    .btn-session-reset {
      width: 100%;
      background: none;
      border: 1px solid rgba(255,100,100,0.2);
      border-radius: 10px;
      color: rgba(255,120,120,0.5);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 9px;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
    }

    .btn-session-reset:hover {
      background: rgba(255,100,100,0.07);
      border-color: rgba(255,100,100,0.45);
      color: rgba(255,140,140,0.85);
    }

    /* ── Add tile — editing state ── */
    .tile-add.editing {
      opacity: 1 !important;
      border-color: rgba(255,255,255,0.18) !important;
      background: rgba(255,255,255,0.04) !important;
      cursor: default;
    }

    .tile-add-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .tile-add-form input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #fff;
      font-size: 0.9rem;
      padding: 9px 12px;
      outline: none;
      text-align: center;
      transition: border-color var(--transition);
    }

    .tile-add-form input:focus { border-color: rgba(255,255,255,0.35); }
    .tile-add-form input::placeholder { color: rgba(255,255,255,0.3); }

    .btn-add-confirm {
      background: #6c63ff;
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px 20px;
      transition: background var(--transition), transform var(--transition);
      width: 100%;
    }

    .btn-add-confirm:hover { background: #7c74ff; }
    .btn-add-confirm:active { transform: scale(0.97); }
    .btn-add-confirm:disabled {
      background: rgba(108,99,255,0.25);
      color: rgba(255,255,255,0.3);
      cursor: default;
    }

    .btn-export {
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 8px 14px;
      transition: border-color var(--transition), color var(--transition);
      white-space: nowrap;
    }

    .btn-export:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    footer {
      padding: 16px 32px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-privacy {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Controls bar ── */
    .controls-bar {
      padding: 14px 32px 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .sort-group {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .sort-group span {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
      margin-right: 4px;
    }

    .btn-sort {
      background: none;
      border: none;
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 5px 10px;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .btn-sort:hover { color: var(--text); background: rgba(255,255,255,0.06); }

    .btn-sort.active {
      background: rgba(108,99,255,0.15);
      color: #a09bff;
    }

    /* ── Grid ── */
    main {
      flex: 1;
      padding: 28px 32px 40px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-height: 60vh;
      color: var(--muted);
      text-align: center;
    }

    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 1rem; max-width: 260px; line-height: 1.5; }

    .suggestions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .suggestions-label {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .suggestions-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .suggestion-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.82rem;
      padding: 6px 16px;
      transition: border-color var(--transition), color var(--transition), background var(--transition);
    }

    .suggestion-chip:hover {
      border-color: rgba(255,255,255,0.2);
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }

    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    }

    main.main--empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .grid--empty {
      display: flex;
      justify-content: center;
    }

    .grid--empty .tile-add {
      width: 260px;
    }

    #suggestions {
      justify-content: center;
      margin-top: 12px;
    }

    /* ── Tile ── */
    .tile {
      --color: #6c63ff;
      position: relative;
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--color) 18%, #0c0c14);
      border: 1px solid color-mix(in srgb, var(--color) 35%, transparent);
      padding: 28px 24px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition);
      user-select: none;
      overflow: hidden;
    }

    .tile:hover { background: color-mix(in srgb, var(--color) 26%, #0c0c14); }

    .tile.running {
      background: color-mix(in srgb, var(--color) 32%, #0c0c14);
      border-color: var(--color);
      box-shadow: 0 0 0 1px var(--color), 0 12px 40px color-mix(in srgb, var(--color) 35%, transparent);
    }

    /* Pop animation on start */
    @keyframes tile-pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    .tile-popping {
      animation: tile-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* accent bar */
    .tile-accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--color);
      border-radius: var(--radius) var(--radius) 0 0;
      opacity: 0.6;
    }
    .tile.running .tile-accent { opacity: 1; }

    /* goal + delete buttons (top corners) */
    .btn-delete, .btn-goal {
      position: absolute;
      top: 12px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      line-height: 1;
      transition: opacity var(--transition), color var(--transition);
    }

    .btn-delete { right: 12px; font-size: 16px; opacity: 0; }
    .btn-goal   { left: 12px;  font-size: 13px; opacity: 1; line-height: 0; }

    .tile:hover .btn-delete { opacity: 1; }
    .btn-delete:hover, .btn-goal:hover { color: rgba(255,255,255,0.9); }

    .tile-name {
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      color: rgba(255,255,255,0.9);
      word-break: break-word;
      max-width: 100%;
    }

    /* Timer */
    .tile-timer {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      color: #fff;
      line-height: 1;
    }

    .tile.running .tile-timer {
      animation: pulse-text 2s ease-in-out infinite;
    }

    @keyframes pulse-text {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.75; }
    }

    /* Progress bar */
    .tile-progress { width: 100%; position: relative; }

    .tile-progress-track {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
    }

    .tile-progress-fill {
      height: 100%;
      border-radius: 2px;
      background: rgba(255,255,255,0.75);
      transition: width 1s linear;
    }

    .tile-progress-fill.complete { background: #ff6584; }

    .tile-progress-label {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.45);
      margin-top: 5px;
      text-align: center;
    }

    /* Play/pause button */
    .btn-play {
      position: relative;
      width: 46px; height: 46px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.8);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
      flex-shrink: 0;
    }

    .btn-play:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.45);
    }

    .btn-play:active { transform: scale(0.92); }

    .tile.running .btn-play {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.6);
    }

    /* Status + sessions */
    .tile-status {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .tile.running .tile-status { color: rgba(255,255,255,0.85); }

    .tile.running .tile-status::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      margin-right: 6px;
      vertical-align: middle;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .tile-sessions {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.38);
    }

    /* Reset button */
    .btn-reset {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: 0.72rem;
      padding: 4px 10px;
      transition: border-color var(--transition), color var(--transition);
    }

    .btn-reset:hover { border-color: rgba(255,255,255,0.35); color: rgba(255,255,255,0.9); }

    /* ── Add tile ── */
    .tile-add {
      background: rgba(255,255,255,0.02) !important;
      border: 1.5px dashed rgba(255,255,255,0.12) !important;
      box-shadow: none !important;
      opacity: 0.5;
      justify-content: center;
      min-height: 200px;
      gap: 10px;
      transition: opacity var(--transition), background var(--transition) !important;
    }

    .tile-add:hover {
      opacity: 0.8 !important;
      background: rgba(255,255,255,0.04) !important;
    }

    .tile-add-icon {
      font-size: 2.2rem;
      color: rgba(255,255,255,0.5);
      line-height: 1;
    }

    .tile-add-label {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
    }

    /* ── Goal popover ── */
    .goal-popover {
      position: fixed;
      background: #1e1e2e;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      padding: 16px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 210px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }

    .goal-popover label {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .goal-popover input {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 8px 10px;
      outline: none;
      width: 100%;
      transition: border-color var(--transition);
    }

    .goal-popover input:focus { border-color: rgba(255,255,255,0.3); }
    .goal-popover input[type=number]::-webkit-inner-spin-button,
    .goal-popover input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .goal-popover input[type=number] { -moz-appearance: textfield; appearance: textfield; }

    .goal-popover-actions { display: flex; gap: 7px; }

    .goal-popover-actions button {
      flex: 1;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 7px 0;
      transition: opacity var(--transition);
    }

    .goal-popover-actions button:hover { opacity: 0.85; }

    .btn-goal-save  { background: #6c63ff; color: #fff; }
    .btn-goal-clear { background: rgba(255,255,255,0.1); color: var(--muted); }

    /* ── FAB + bottom sheet ── */
    .add-sheet-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
    }

    .add-sheet-backdrop.open { display: block; }

    .add-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1e1e2e;
      border-top: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px 20px 0 0;
      padding: 12px 20px 40px;
      z-index: 301;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .add-sheet.open {
      transform: translateY(0);
    }

    /* ── Écran vide ── */
    .empty-fullscreen {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      background-color: #0f0f13;
      animation: bg-shift 10s ease-in-out infinite;
      z-index: 50;
      user-select: none;
    }

    @keyframes bg-shift {
      0%   { background-color: #0f0f13; }
      25%  { background-color: #100d20; }
      50%  { background-color: #07131a; }
      75%  { background-color: #160d0d; }
      100% { background-color: #0f0f13; }
    }

    @keyframes text-shift {
      0%   { color: rgba(255,255,255,0.32); }
      25%  { color: rgba(190,170,255,0.55); }
      50%  { color: rgba(140,215,235,0.55); }
      75%  { color: rgba(255,175,155,0.55); }
      100% { color: rgba(255,255,255,0.32); }
    }

    @keyframes plus-shift {
      0%   { color: rgba(255,255,255,0.55); transform: scale(1);    opacity: 0.45; }
      25%  { color: rgba(190,170,255,0.85); transform: scale(1.08); opacity: 0.9;  }
      50%  { color: rgba(140,215,235,0.85); transform: scale(1);    opacity: 0.7;  }
      75%  { color: rgba(255,175,155,0.85); transform: scale(1.05); opacity: 0.85; }
      100% { color: rgba(255,255,255,0.55); transform: scale(1);    opacity: 0.45; }
    }

    .empty-fullscreen.visible { display: flex; }

    .empty-tagline {
      font-size: 0.85rem;
      letter-spacing: 0.02em;
      text-align: center;
      animation: text-shift 10s ease-in-out infinite;
    }

    .empty-plus-icon {
      font-size: 7rem;
      font-weight: 200;
      line-height: 1;
      animation: plus-shift 10s ease-in-out infinite;
    }

    .empty-hint {
      font-size: 0.8rem;
      text-align: center;
      max-width: 260px;
      line-height: 1.6;
      animation: text-shift 10s ease-in-out infinite;
    }

    .add-sheet-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.18);
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .add-sheet-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      margin: 0 0 20px;
    }

    .add-sheet-input-big {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 2px solid rgba(255,255,255,0.12);
      color: #fff;
      font-size: 1.7rem;
      font-weight: 500;
      padding: 8px 0 14px;
      outline: none;
      text-align: center;
      caret-color: #6c63ff;
      letter-spacing: -0.02em;
      transition: border-color 0.2s;
    }

    .add-sheet-input-big:focus { border-bottom-color: #6c63ff; }

    .add-sheet-input-big::placeholder {
      color: rgba(255,255,255,0.18);
      font-weight: 300;
    }

    .add-sheet-quick {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-start;
      margin-top: 18px;
    }

    .add-sheet-quick-label {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .add-sheet-quick-chip {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      font-size: 0.82rem;
      padding: 7px 16px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .add-sheet-quick-chip:active {
      background: rgba(108,99,255,0.25);
      border-color: rgba(108,99,255,0.6);
      color: #fff;
    }

    .btn-add-sheet-cta {
      display: block;
      width: 100%;
      background: #6c63ff;
      border: none;
      border-radius: 16px;
      color: #fff;
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 19px;
      margin-top: 24px;
      letter-spacing: -0.01em;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
    }

    .btn-add-sheet-cta:disabled {
      background: rgba(108,99,255,0.18);
      color: rgba(255,255,255,0.2);
      cursor: default;
    }

    .btn-add-sheet-cta:not(:disabled):active { transform: scale(0.98); }

    /* Masqué sur desktop, visible uniquement sur mobile */
    .btn-export-mobile { display: none; }

    /* ── Mobile sort inline (header) ── */
    .mobile-sort-inline { display: none; }

    /* ── Drag handle ── */
    .drag-handle {
      display: none;
      color: rgba(255,255,255,0.2);
      font-size: 1.2rem;
      padding: 4px 2px;
      flex-shrink: 0;
      touch-action: none;
      line-height: 1;
      user-select: none;
      cursor: grab;
    }
    .tile--row .drag-handle { display: block; }
    .tile--dragging { opacity: 0.75; box-shadow: 0 12px 32px rgba(0,0,0,0.5) !important; position: relative; z-index: 10; }

    /* ── Mobile bottom bar ── */
    .mobile-bottom-bar {
      display: none;
    }

    .btn-mobile-add {
      flex: 1;
      background: #6c63ff;
      color: #fff;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1;
      padding: 16px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn-mobile-add:active { transform: scale(0.96); opacity: 0.85; }

    .btn-mobile-end {
      flex: 1;
      background: rgba(255,100,100,0.08);
      border: 1px solid rgba(255,100,100,0.25);
      color: rgba(255,140,140,0.75);
      border-radius: 14px;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 16px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-mobile-end.active {
      border-color: rgba(255,100,100,0.55);
      color: rgba(255,140,140,0.95);
      background: rgba(255,100,100,0.12);
    }
    .btn-mobile-end:active { background: rgba(255,100,100,0.18); }

    @media (max-width: 600px) {
      /* ── Layout ── */
      header { display: flex; padding: 20px 16px 0; align-items: center; justify-content: space-between; gap: 12px; }
      main { padding: 16px 12px 180px; }
      footer { display: none; }
      .controls-bar { display: none !important; }
      header h1 { display: none; }
      .header-right { display: none; }
      .header-total { display: none; }

      /* ── Header mobile : export uniquement ── */
      .btn-export-mobile { order: 1; display: block; font-size: 0.75rem; padding: 8px 12px; flex-shrink: 0; }

      /* ── Grille ── */
      .grid { grid-template-columns: 1fr; gap: 8px; }

      /* ── Tuile base mobile ── */
      .tile { gap: 6px; }
      .tile-status { display: none; }
      .btn-reset   { display: none; }
      .btn-delete  { opacity: 1; }

      /* ── Hero (activité en cours) ── */
      .tile--hero { padding: 28px 24px 24px; gap: 12px; }
      .tile--hero .tile-timer  { font-size: 3rem; }
      .tile--hero .tile-status { display: block; }
      .tile--hero .btn-play    { width: 56px; height: 56px; font-size: 1.2rem; }

      /* ── Row (activités en attente) ── */
      .tile--row { flex-direction: row; align-items: center; padding: 14px 16px; gap: 12px; border-radius: 14px; }
      .tile--row .tile-accent { top: 6px; bottom: 6px; left: 0; right: auto; width: 3px; height: auto; border-radius: 0 2px 2px 0; }
      .tile--row .tile-name   { flex: 1; text-align: left; padding-left: 4px; }
      .tile--row .tile-timer  { font-size: 1rem; color: rgba(255,255,255,0.45); flex-shrink: 0; }
      .tile--row .btn-play    { width: 36px; height: 36px; font-size: 0.82rem; flex-shrink: 0; }
      .tile--row .btn-goal,
      .tile--row .btn-delete,
      .tile--row .tile-status,
      .tile--row .tile-progress,
      .tile--row .btn-reset   { display: none; }

      /* ── Cacher la tuile add (remplacée par la barre mobile) ── */
      .tile-add { display: none !important; }

      /* ── Popover objectif : pleine largeur ── */
      .goal-popover { width: calc(100vw - 32px); left: 16px !important; right: 16px; }

      /* ── Cacher le bouton fin de session dans le header ── */
      header .btn-end-session { display: none; }

      /* ── Barre d'actions mobile ── */
      .mobile-bottom-bar.visible {
        display: flex;
        flex-direction: column;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: rgba(16,16,26,0.94);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-top: 1px solid rgba(255,255,255,0.07);
        padding: 12px 16px calc(20px + env(safe-area-inset-bottom));
        gap: 10px;
        z-index: 100;
      }

      .mobile-total { text-align: center; font-size: 0.68rem; color: var(--muted); font-variant-numeric: tabular-nums; line-height: 1.4; }
      .mobile-total strong { display: block; color: rgba(240,240,245,0.4); font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
      .mobile-action-row { display: flex; gap: 10px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Tic-Task : time tracking</h1>
  <div class="header-total" id="headerTotal"></div>
  <div class="header-right">
    <button class="btn-end-session" id="btnEndSession">Fini pour aujourd'hui !</button>
  </div>
  <div class="mobile-sort-inline" id="mobileSortInline">
    <button class="btn-sort active" data-sort="created">Création</button>
    <button class="btn-sort" data-sort="name">Nom</button>
    <button class="btn-sort" data-sort="elapsed">Temps</button>
  </div>
</header>

<div class="controls-bar">
  <div class="sort-group" id="sortBar">
    <span>Trier :</span>
    <button class="btn-sort active" data-sort="created">Création</button>
    <button class="btn-sort" data-sort="name">Nom</button>
    <button class="btn-sort" data-sort="elapsed">Temps</button>
  </div>
</div>

<main>
  <div class="grid" id="grid"></div>
</main>

<!-- Dalle plein écran (état vide) -->
<div class="empty-fullscreen" id="emptyFullscreen">
  <p class="empty-tagline">Commencez par ajouter une activité</p>
  <div class="empty-plus-icon">+</div>
  <p class="empty-hint">Par exemple : mails, sport, apprentissage…</p>
</div>

<!-- Barre d'actions mobile -->
<div class="mobile-bottom-bar" id="mobileBottomBar">
  <div class="mobile-total" id="mobileTotal"></div>
  <div class="mobile-action-row">
    <button class="btn-mobile-add" id="btnMobileAdd">Ajouter une activité</button>
    <button class="btn-mobile-end" id="btnMobileEnd">Fini pour aujourd'hui !</button>
  </div>
</div>

<!-- Bottom sheet mobile -->
<div class="add-sheet-backdrop" id="addSheetBackdrop"></div>
<div class="add-sheet" id="addSheet">
  <div class="add-sheet-handle"></div>
  <p class="add-sheet-title">Nouvelle activité</p>
  <input type="text" id="addSheetInput" class="add-sheet-input-big" placeholder="Indiquez une activité" maxlength="40" autocomplete="off" />
  <div class="add-sheet-quick">
    <span class="add-sheet-quick-label">Par exemple :</span>
    <button class="add-sheet-quick-chip" data-quick="Mails">Mails</button>
    <button class="add-sheet-quick-chip" data-quick="Sport">Sport</button>
    <button class="add-sheet-quick-chip" data-quick="Apprentissage">Apprentissage</button>
    <button class="add-sheet-quick-chip" data-quick="Veille">Veille</button>
    <button class="add-sheet-quick-chip" data-quick="Lecture">Lecture</button>
  </div>
  <button class="btn-add-sheet-cta" id="addSheetConfirm" disabled>Créer l'activité →</button>
</div>

<footer>
  <span class="footer-privacy">🔒 Aucune de vos données n'est collectée</span>
  <button class="btn-export" id="btnExport" title="Exporter les données en CSV">↓ Exporter mes statistiques (CSV)</button>
</footer>

<script>
  // ── Palette ──────────────────────────────────────────────────────────────
  const COLORS = [
    '#6c63ff','#ff6584','#43d9ad','#ffb347',
    '#4fc3f7','#e879f9','#a3e635','#fb923c',
    '#38bdf8','#f472b6','#34d399','#fbbf24',
  ];

  // ── State ────────────────────────────────────────────────────────────────
  let activities = load();
  let archivedActivities = loadArchive();
  let sessionDeletedItems = [];
  let sortBy = localStorage.getItem('tt_sort') || 'created';
  let sessionStart = null;
  let sessionSnapshot = {}; // { id: elapsedAtSessionStart }
  let tick = null;
  let audioCtx = null;

  // ── Chime (Web Audio API) ─────────────────────────────────────────────────
  function playChime() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = audioCtx;
      const now = ctx.currentTime;

      function note(freq, start, duration, gainPeak) {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(gainPeak, start + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        osc.start(start);
        osc.stop(start + duration);
      }

      // Doux arpège ascendant : E5 → A5 → C6
      note(659,  now,       1.8, 0.22);
      note(880,  now + 0.22, 1.6, 0.18);
      note(1047, now + 0.42, 2.2, 0.13);
    } catch (e) { /* silently ignore if audio unavailable */ }
  }

  // ── Day helpers ──────────────────────────────────────────────────────────
  function todayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }

  function load() {
    try {
      const data = JSON.parse(localStorage.getItem('tt_activities')) || [];
      const savedDay = localStorage.getItem('tt_day');
      const today = todayKey();
      if (savedDay !== today) {
        data.forEach(a => { a.todayElapsed = 0; a.baseTodayElapsed = 0; });
        localStorage.setItem('tt_day', today);
      }
      // Si une activité tournait quand la page a été fermée/rechargée, rattraper le temps
      data.forEach(a => {
        if (a.running && a.startedAt) {
          const delta = Math.floor((Date.now() - a.startedAt) / 1000);
          a.elapsed = (a.baseElapsed || 0) + delta;
          a.todayElapsed = (a.baseTodayElapsed || 0) + delta;
          a.baseElapsed = a.elapsed;
          a.baseTodayElapsed = a.todayElapsed;
          a.startedAt = Date.now();
        }
      });
      return data;
    } catch { return []; }
  }

  function sorted() {
    const list = [...activities];
    if (sortBy === 'name')    return list.sort((a, b) => a.name.localeCompare(b.name, 'fr'));
    if (sortBy === 'elapsed') return list.sort((a, b) => b.elapsed - a.elapsed);
    return list;
  }

  function save() {
    localStorage.setItem('tt_activities', JSON.stringify(activities));
  }

  function loadArchive() {
    try { return JSON.parse(localStorage.getItem('tt_archive')) || []; }
    catch { return []; }
  }

  function saveArchive() {
    localStorage.setItem('tt_archive', JSON.stringify(archivedActivities));
  }

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  // ── Ticker ───────────────────────────────────────────────────────────────
  function startTick() {
    if (tick) return;
    tick = setInterval(() => {
      let dirty = false;
      let chimePending = false;
      activities.forEach(a => {
        if (a.running && a.startedAt) {
          const delta = Math.floor((Date.now() - a.startedAt) / 1000);
          const prevElapsed = a.elapsed;
          a.elapsed = a.baseElapsed + delta;
          a.todayElapsed = a.baseTodayElapsed + delta;
          if (Math.floor(a.elapsed / 3600) > Math.floor(prevElapsed / 3600)) chimePending = true;
          dirty = true;
        }
      });
      if (chimePending) playChime();
      if (dirty) {
        if (localStorage.getItem('tt_day') !== todayKey()) {
          activities.forEach(a => {
            if (a.running && a.startedAt) {
              const delta = Math.floor((Date.now() - a.startedAt) / 1000);
              a.elapsed = a.baseElapsed + delta;
              a.baseElapsed = a.elapsed;
              a.todayElapsed = 0;
              a.baseTodayElapsed = 0;
              a.startedAt = Date.now();
            } else {
              a.todayElapsed = 0;
            }
          });
          localStorage.setItem('tt_day', todayKey());
        }
        renderTimers();
        renderTotals();
        save();
      }
    }, 1000);
  }

  function stopTick() {
    const anyRunning = activities.some(a => a.running);
    if (!anyRunning && tick) { clearInterval(tick); tick = null; }
  }

  // ── Format ───────────────────────────────────────────────────────────────
  function fmt(secs) {
    secs = Math.max(0, parseInt(secs, 10) || 0);
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    if (h > 0) return `${h}:${pad(m)}:${pad(s)}`;
    return `${pad(m)}:${pad(s)}`;
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Progress bar HTML ─────────────────────────────────────────────────────
  function progressHTML(a) {
    if (!a.goal) return '';
    const pct = Math.min(100, Math.round((a.elapsed / a.goal) * 100));
    const complete = pct >= 100;
    const label = complete
      ? 'Objectif atteint !'
      : `${fmt(Math.max(0, a.goal - a.elapsed))} restant`;
    return `
      <div class="tile-progress">
        <div class="tile-progress-track">
          <div class="tile-progress-fill${complete ? ' complete' : ''}" style="width:${pct}%"></div>
        </div>
        <div class="tile-progress-label">${label}</div>
      </div>`;
  }

  // ── Render ───────────────────────────────────────────────────────────────
  function render() {
    const grid = document.getElementById('grid');

    grid.innerHTML = '';

    const isMobile = window.innerWidth <= 600;
    let list;
    if (isMobile) {
      const running = activities.filter(a => a.running);
      const rest    = activities.filter(a => !a.running);
      list = [...running, ...rest];
    } else {
      list = sorted();
    }
    list.forEach(a => {
      const tile = document.createElement('div');
      const isRow = isMobile;
      tile.className = 'tile'
        + (a.running ? ' running' : '')
        + (isRow ? ' tile--row' : '');
      tile.style.setProperty('--color', a.color);
      tile.dataset.id = a.id;

      tile.innerHTML = `
        <div class="tile-accent"></div>
        <button class="btn-goal" title="Définir un objectif" data-goal="${a.id}"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="1.2" fill="currentColor"/></svg></button>
        <button class="btn-delete" title="Supprimer" data-delete="${a.id}">✕</button>
        <div class="tile-name">${escHtml(a.name)}</div>
        <div class="tile-timer" data-timer="${a.id}">${fmt(a.elapsed)}</div>
        ${progressHTML(a)}
        <button class="btn-play" data-play="${a.id}">${isRow ? (a.running ? '<svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="3" y="3" width="4" height="12" rx="1"/><rect x="11" y="3" width="4" height="12" rx="1"/></svg>' : '<svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><path d="M4 2L14 9L4 16V2Z"/></svg>') : (a.running ? '❙❙' : '⏵')}</button>
        <div class="tile-status">${a.running ? 'En cours' : 'Démarrer'}</div>

        <button class="btn-reset" data-reset="${a.id}">Remettre à zéro</button>
      `;

      tile.addEventListener('click', e => {
        if (e.target.closest('[data-delete]') ||
            e.target.closest('[data-reset]')  ||
            e.target.closest('[data-play]')   ||
            e.target.closest('[data-goal]')   ||
            e.target.closest('.drag-handle')) return;
        toggleActivity(a.id);
      });

      if (isRow) attachSwipeDelete(tile, a.id);
      if (isRow) attachDragReorder(tile, a.id);

      grid.appendChild(tile);
    });

    // Add tile (always last)
    {
      const addTile = document.createElement('div');
      addTile.className = 'tile tile-add';
      addTile.innerHTML = `
        <div class="tile-add-icon">+</div>
        <div class="tile-add-label">Ajouter une activité</div>
      `;
      addTile.addEventListener('click', () => {
        if (addTile.classList.contains('editing')) return;
        addTile.classList.add('editing');
        addTile.innerHTML = `
          <div class="tile-add-form">
            <input type="text" placeholder="Nom de l'activité…" maxlength="40" autocomplete="off" />
            <button class="btn-add-confirm" disabled>+ Créer</button>
          </div>
        `;
        const input  = addTile.querySelector('input');
        const btnCfm = addTile.querySelector('.btn-add-confirm');
        input.focus();

        input.addEventListener('input', () => {
          btnCfm.disabled = input.value.trim().length === 0;
        });

        function confirm() {
          const val = input.value.trim();
          if (val) addActivity(val);
          else cancel();
        }

        function cancel() {
          addTile.classList.remove('editing');
          render();
        }

        btnCfm.addEventListener('click', confirm);

        input.addEventListener('keydown', e => {
          if (e.key === 'Enter')  confirm();
          if (e.key === 'Escape') cancel();
        });

        setTimeout(() => {
          document.addEventListener('click', function outside(e) {
            if (!document.contains(addTile)) {
              document.removeEventListener('click', outside);
              return;
            }
            if (!addTile.contains(e.target)) {
              cancel();
              document.removeEventListener('click', outside);
            }
          });
        }, 0);
      });
      grid.appendChild(addTile);
    }

    const isEmpty = activities.length === 0;
    grid.classList.toggle('grid--empty', isEmpty);
    document.querySelector('main').classList.toggle('main--empty', isEmpty);

    // Basculer entre état vide (dalle) et état normal
    document.getElementById('emptyFullscreen').classList.toggle('visible', isEmpty);
    document.querySelector('header').style.display         = isEmpty ? 'none' : '';
    document.querySelector('.controls-bar').style.display  = isEmpty ? 'none' : '';
    document.querySelector('main').style.display           = isEmpty ? 'none' : '';
    document.querySelector('footer').style.display         = isEmpty ? 'none' : '';
    document.getElementById('mobileBottomBar').classList.toggle('visible', !isEmpty);

    const mobileEndBtn = document.getElementById('btnMobileEnd');
    if (mobileEndBtn) mobileEndBtn.classList.toggle('active', !!sessionStart);

    // Event delegation
    grid.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); deleteActivity(btn.dataset.delete); });
    });

    grid.querySelectorAll('[data-reset]').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); resetActivity(btn.dataset.reset); });
    });

    grid.querySelectorAll('[data-play]').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); toggleActivity(btn.dataset.play); });
    });

    grid.querySelectorAll('[data-goal]').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); openGoalPopover(btn.dataset.goal, btn); });
    });

    renderTotals();
  }

  // ── Lightweight update (no DOM rebuild) ──────────────────────────────────
  function renderTimers() {
    activities.forEach(a => {
      const timerEl = document.querySelector(`[data-timer="${a.id}"]`);
      if (timerEl) timerEl.textContent = fmt(a.elapsed);

      const tile = document.querySelector(`.tile[data-id="${a.id}"]`);
      if (!tile) return;

      tile.classList.toggle('running', a.running);

      const status = tile.querySelector('.tile-status');
      if (status) status.textContent = a.running ? 'En cours' : 'Démarrer';

      const btnPlay = tile.querySelector('[data-play]');
      if (btnPlay) {
        const isMobile = window.innerWidth <= 600;
        if (isMobile) {
          btnPlay.innerHTML = a.running ? '<svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="3" y="3" width="4" height="12" rx="1"/><rect x="11" y="3" width="4" height="12" rx="1"/></svg>' : '<svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><path d="M4 2L14 9L4 16V2Z"/></svg>';
        } else {
          btnPlay.textContent = a.running ? '❙❙' : '⏵';
        }
      }

      // Progress bar update
      const fill  = tile.querySelector('.tile-progress-fill');
      const label = tile.querySelector('.tile-progress-label');
      if (fill && a.goal) {
        const pct = Math.min(100, Math.round((a.elapsed / a.goal) * 100));
        fill.style.width = pct + '%';
        fill.classList.toggle('complete', pct >= 100);
        if (label) {
          const remaining = Math.max(0, a.goal - a.elapsed);
          label.textContent = pct >= 100 ? 'Objectif atteint !' : `${fmt(remaining)} restant`;
        }
      }
    });
  }

  function renderTotals() {
    const todayTotal = activities.reduce((s, a) => s + (a.todayElapsed || 0), 0);
    const totalHTML = `Total aujourd'hui<strong>${fmt(todayTotal)}</strong>`;

    const el = document.getElementById('headerTotal');
    if (el) el.innerHTML = totalHTML;

    const mobileEl = document.getElementById('mobileTotal');
    if (mobileEl) mobileEl.innerHTML = totalHTML;

    const btn = document.getElementById('btnEndSession');
    if (btn) btn.classList.toggle('active', !!sessionStart);
  }

  // ── End session ──────────────────────────────────────────────────────────
  function endSession() {
    activities.forEach(a => {
      if (a.running && a.startedAt) {
        const delta = Math.floor((Date.now() - a.startedAt) / 1000);
        a.elapsed = a.baseElapsed + delta;
        a.todayElapsed = a.baseTodayElapsed + delta;
        a.startedAt = null;
      }
    });

    const liveItems = activities
      .map(a => ({ ...a, sessionTime: a.elapsed - (sessionSnapshot[a.id] || 0) }))
      .filter(a => a.sessionTime > 0);
    const sessionItems = [...liveItems, ...sessionDeletedItems]
      .sort((a, b) => b.sessionTime - a.sessionTime);

    const duration = sessionItems.reduce((s, a) => s + a.sessionTime, 0);

    // Stop all timers
    activities.forEach(a => { a.running = false; });
    stopTick();
    sessionStart = null;
    sessionSnapshot = {};
    sessionDeletedItems = [];
    save();
    renderTimers();
    renderTotals();

    showSessionModal(duration, sessionItems);
  }

  function showSessionModal(duration, items) {
    const existing = document.getElementById('sessionBackdrop');
    if (existing) existing.remove();

    const backdrop = document.createElement('div');
    backdrop.className = 'session-backdrop';
    backdrop.id = 'sessionBackdrop';

    const activitiesHTML = items.length
      ? items.map(a => `
          <div class="session-activity-item">
            <div class="session-activity-dot" style="background:${a.color}"></div>
            <div class="session-activity-name">${escHtml(a.name)}</div>
            <div class="session-activity-time">${fmt(a.sessionTime)}</div>
          </div>`).join('')
      : `<p style="color:var(--muted);text-align:center;font-size:0.88rem;padding:8px 0">Aucune activité cette session.</p>`;

    backdrop.innerHTML = `
      <div class="session-modal">
        <div class="session-modal-header">
          <h2>Mes stats du jour</h2>
        </div>
        <div>
          <div class="session-duration-label">Durée totale</div>
          <div class="session-duration">${fmt(duration)}</div>
          <div class="session-activity-count">${items.length} activité${items.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="session-activity-list">${activitiesHTML}</div>
        <div class="session-modal-actions">
          ${items.length ? '<button class="btn-session-export" id="btnSessionExport">↓ Exporter</button>' : ''}
          <button class="btn-session-close" id="btnSessionClose">Fermer</button>
        </div>
        <button class="btn-session-reset" id="btnSessionReset">Réinitialiser toutes les activités</button>
      </div>
    `;

    document.body.appendChild(backdrop);

    function closeModal() { backdrop.remove(); }

    document.getElementById('btnSessionClose').addEventListener('click', closeModal);
    backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });

    document.getElementById('btnSessionReset').addEventListener('click', () => {
      activities.forEach(a => {
        a.elapsed = 0; a.todayElapsed = 0; a.sessions = 0;
        a.running = false; a.startedAt = null;
      });
      archivedActivities = [];
      sessionDeletedItems = [];
      saveArchive();
      stopTick();
      save();
      render();
      closeModal();
    });

    if (items.length) {
      document.getElementById('btnSessionExport').addEventListener('click', () => {
        const date = new Date().toISOString().slice(0, 10);
        const rows = [
          ['Activité', 'Temps cette session', 'Temps total', 'Sessions'],
          ...items.map(a => [
            `"${a.name.replace(/"/g, '""')}"`,
            fmtDuration(a.sessionTime),
            fmtDuration(a.elapsed),
            a.sessions,
          ]),
          ['', '', '', ''],
          ['Durée session', fmtDuration(duration), '', ''],
        ];
        const csv = rows.map(r => r.join(';')).join('\r\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `session-${date}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      });
    }
  }

  // ── Actions ──────────────────────────────────────────────────────────────
  function addActivity(name) {
    const colorIndex = activities.length % COLORS.length;
    activities.push({
      id: uid(),
      name: name.trim(),
      color: COLORS[colorIndex],
      elapsed: 0,
      todayElapsed: 0,
      running: false,
      sessions: 0,
      goal: null,
      createdAt: Date.now(),
    });
    save();
    render();
  }

  function toggleActivity(id) {
    const a = activities.find(x => x.id === id);
    if (!a) return;

    if (a.running) {
      if (a.startedAt) {
        const delta = Math.floor((Date.now() - a.startedAt) / 1000);
        a.elapsed = a.baseElapsed + delta;
        a.todayElapsed = a.baseTodayElapsed + delta;
        a.startedAt = null;
      }
      a.running = false;
      stopTick();
      if (!activities.some(x => x.running)) sessionStart = null;
    } else {
      if (!activities.some(x => x.running)) {
        sessionStart = Date.now();
        sessionSnapshot = {};
        activities.forEach(x => { sessionSnapshot[x.id] = x.elapsed; });
      }
      a.running = true;
      a.startedAt = Date.now();
      a.baseElapsed = a.elapsed;
      a.baseTodayElapsed = a.todayElapsed || 0;
      a.sessions++;
      startTick();

      // Pop animation
      const tileEl = document.querySelector(`.tile[data-id="${id}"]`);
      if (tileEl) {
        tileEl.classList.remove('tile-popping');
        void tileEl.offsetWidth; // reflow to restart animation
        tileEl.classList.add('tile-popping');
        tileEl.addEventListener('animationend', () => tileEl.classList.remove('tile-popping'), { once: true });
      }
    }

    save();
    render();
  }

  function deleteActivity(id) {
    const a = activities.find(x => x.id === id);
    if (a) {
      if (a.running && a.startedAt) {
        const delta = Math.floor((Date.now() - a.startedAt) / 1000);
        a.elapsed = a.baseElapsed + delta;
        a.todayElapsed = a.baseTodayElapsed + delta;
        a.startedAt = null;
      }
      const sessionTime = a.elapsed - (sessionSnapshot[a.id] || 0);
      if (sessionTime > 0) sessionDeletedItems.push({ ...a, sessionTime, running: false });
      const archIdx = archivedActivities.findIndex(x => x.id === a.id);
      if (archIdx >= 0) archivedActivities[archIdx] = { ...a, running: false };
      else archivedActivities.push({ ...a, running: false });
      saveArchive();
    }
    activities = activities.filter(x => x.id !== id);
    stopTick();
    save();
    render();
  }

  function attachSwipeDelete(el, id) {
    let startX = 0, startY = 0, swiping = false;
    el.addEventListener('touchstart', e => {
      if (e.target.closest('.drag-handle')) return;
      startX  = e.touches[0].clientX;
      startY  = e.touches[0].clientY;
      swiping = false;
      el.style.transition = 'none';
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (!swiping && Math.abs(dy) > Math.abs(dx)) return;
      swiping = true;
      if (dx < 0) {
        e.preventDefault();
        el.style.transform = `translateX(${dx}px)`;
        el.style.opacity   = String(Math.max(0.25, 1 + dx / 160));
      }
    }, { passive: false });

    el.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      if (swiping && dx < -80) {
        el.style.transition = 'transform 0.22s ease, opacity 0.22s ease';
        el.style.transform  = 'translateX(-110%)';
        el.style.opacity    = '0';
        setTimeout(() => deleteActivity(id), 230);
      } else {
        el.style.transition = 'transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s';
        el.style.transform  = '';
        el.style.opacity    = '';
      }
    });
  }

  function attachDragReorder(el, id) {
    let startY = 0, isDragging = false;

    el.addEventListener('touchstart', e => {
      startY = e.touches[0].clientY;
      isDragging = true;
      el.style.transition = 'none';
      el.classList.add('tile--dragging');
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      if (!isDragging) return;
      e.preventDefault();
      el.style.transform = `translateY(${e.touches[0].clientY - startY}px)`;
    }, { passive: false });

    el.addEventListener('touchend', e => {
      if (!isDragging) return;
      isDragging = false;
      el.classList.remove('tile--dragging');
      el.style.transition = 'transform 0.2s ease';
      el.style.transform = '';
      setTimeout(() => { el.style.transition = ''; }, 200);

      const dropY = e.changedTouches[0].clientY;
      const grid = document.getElementById('grid');
      const tiles = [...grid.querySelectorAll('.tile[data-id]')];
      const tileIds = tiles.map(t => t.dataset.id);
      const currentRenderIdx = tileIds.indexOf(id);

      let targetRenderIdx = tileIds.length;
      for (let i = 0; i < tiles.length; i++) {
        if (tiles[i].dataset.id === id) continue;
        const rect = tiles[i].getBoundingClientRect();
        if (dropY < rect.top + rect.height / 2) { targetRenderIdx = i; break; }
      }

      if (targetRenderIdx === currentRenderIdx || targetRenderIdx === currentRenderIdx + 1) return;

      const newOrder = [...tileIds];
      newOrder.splice(currentRenderIdx, 1);
      const adj = targetRenderIdx > currentRenderIdx ? targetRenderIdx - 1 : targetRenderIdx;
      newOrder.splice(adj, 0, id);

      activities.sort((a, b) => {
        const ai = newOrder.indexOf(a.id), bi = newOrder.indexOf(b.id);
        if (ai === -1 && bi === -1) return 0;
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      });
      save();
      render();
    });
  }

  function resetActivity(id) {
    const a = activities.find(x => x.id === id);
    if (!a) return;
    a.elapsed = 0;
    a.todayElapsed = 0;
    a.sessions = 0;
    a.running = false;
    a.startedAt = null;
    stopTick();
    save();
    render();
  }

  function setGoal(id, secs) {
    const a = activities.find(x => x.id === id);
    if (!a) return;
    a.goal = secs || null;
    save();
    render();
  }

  // ── Goal popover ─────────────────────────────────────────────────────────
  let goalPopover = null;

  function openGoalPopover(id, btn) {
    closeGoalPopover();
    const a = activities.find(x => x.id === id);
    if (!a) return;

    const pop = document.createElement('div');
    pop.className = 'goal-popover';
    pop.innerHTML = `
      <label>Objectif (en minutes)</label>
      <input type="number" min="1" max="1440" placeholder="ex : 60" value="${a.goal ? Math.round(a.goal / 60) : ''}" />
      <div class="goal-popover-actions">
        <button class="btn-goal-save">Enregistrer</button>
        <button class="btn-goal-clear">Retirer</button>
      </div>
    `;
    document.body.appendChild(pop);
    goalPopover = pop;

    // Position below the ✎ button
    const rect = btn.getBoundingClientRect();
    pop.style.top  = (rect.bottom + 8 + window.scrollY) + 'px';
    pop.style.left = rect.left + 'px';

    // Keep inside viewport
    requestAnimationFrame(() => {
      const pr = pop.getBoundingClientRect();
      if (pr.right > window.innerWidth - 8)
        pop.style.left = (window.innerWidth - pr.width - 8) + 'px';
    });

    const input = pop.querySelector('input');
    input.focus();
    input.select();

    pop.querySelector('.btn-goal-save').addEventListener('click', () => {
      const val = parseInt(input.value, 10);
      if (val > 0) setGoal(id, val * 60);
      closeGoalPopover();
    });

    pop.querySelector('.btn-goal-clear').addEventListener('click', () => {
      setGoal(id, null);
      closeGoalPopover();
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { pop.querySelector('.btn-goal-save').click(); }
      if (e.key === 'Escape') { closeGoalPopover(); }
    });

    setTimeout(() => document.addEventListener('click', outsideClick), 0);
  }

  function outsideClick(e) {
    if (goalPopover && !goalPopover.contains(e.target)) closeGoalPopover();
  }

  function closeGoalPopover() {
    if (goalPopover) {
      goalPopover.remove();
      goalPopover = null;
      document.removeEventListener('click', outsideClick);
    }
  }

  document.getElementById('btnEndSession').addEventListener('click', endSession);

  // ── FAB / bottom sheet (mobile) ──────────────────────────────────────────
  const addSheet        = document.getElementById('addSheet');
  const addSheetBackdrop = document.getElementById('addSheetBackdrop');
  const addSheetInput   = document.getElementById('addSheetInput');
  const addSheetConfirm = document.getElementById('addSheetConfirm');

  function openAddSheet() {
    addSheetBackdrop.classList.add('open');
    addSheet.classList.add('open');
    addSheetInput.value = '';
    addSheetConfirm.disabled = true;
    addSheetInput.focus();
  }

  function closeAddSheet() {
    addSheetInput.blur();
    addSheet.classList.remove('open');
    addSheetBackdrop.classList.remove('open');
    window.scrollTo(0, 0);
  }

  function confirmAddSheet() {
    const val = addSheetInput.value.trim();
    if (val) { addActivity(val); closeAddSheet(); }
  }

  addSheetBackdrop.addEventListener('click', closeAddSheet);

  addSheetInput.addEventListener('input', () => {
    addSheetConfirm.disabled = addSheetInput.value.trim().length === 0;
  });

  addSheetInput.addEventListener('keydown', e => {
    if (e.key === 'Enter')  confirmAddSheet();
    if (e.key === 'Escape') closeAddSheet();
  });

  addSheetConfirm.addEventListener('click', confirmAddSheet);

  document.getElementById('addSheet').addEventListener('click', e => {
    const chip = e.target.closest('[data-quick]');
    if (!chip) return;
    addActivity(chip.dataset.quick);
    closeAddSheet();
  });

  // ── Dalle vide ───────────────────────────────────────────────────────────
  document.getElementById('emptyFullscreen').addEventListener('touchend', (e) => { e.preventDefault(); openAddSheet(); }, { passive: false });
  document.getElementById('emptyFullscreen').addEventListener('click', openAddSheet);

  // ── Sort ─────────────────────────────────────────────────────────────────
  function updateSortButtons() {
    document.querySelectorAll('.btn-sort').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.sort === sortBy);
    });
  }

  function handleSortClick(e) {
    const btn = e.target.closest('.btn-sort');
    if (!btn) return;
    sortBy = btn.dataset.sort;
    localStorage.setItem('tt_sort', sortBy);
    updateSortButtons();
    render();
  }

  document.getElementById('sortBar').addEventListener('click', handleSortClick);
  document.getElementById('mobileSortInline').addEventListener('click', handleSortClick);

  document.getElementById('btnMobileAdd').addEventListener('touchend', (e) => { e.preventDefault(); openAddSheet(); }, { passive: false });
  document.getElementById('btnMobileAdd').addEventListener('click', openAddSheet);
  document.getElementById('btnMobileEnd').addEventListener('click', endSession);

  // ── Export CSV ───────────────────────────────────────────────────────────
  function fmtDuration(secs) {
    secs = Math.max(0, parseInt(secs, 10) || 0);
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
  }

  function exportCSV() {
    const deleted = archivedActivities.filter(a => !activities.find(x => x.id === a.id));
    const allActivities = [...activities, ...deleted];
    if (!allActivities.length) return;
    const today = new Date().toISOString().slice(0, 10);
    const rows = [
      ['Activité', 'Temps total', "Temps aujourd'hui", 'Sessions', 'Objectif', 'Créé le'],
      ...allActivities.map(a => [
        `"${a.name.replace(/"/g, '""')}"`,
        fmtDuration(a.elapsed),
        fmtDuration(a.todayElapsed || 0),
        a.sessions,
        a.goal ? fmtDuration(a.goal) : '',
        a.createdAt ? new Date(a.createdAt).toLocaleDateString('fr-FR') : '',
      ]),
    ];
    const csv = rows.map(r => r.join(';')).join('\r\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `time-tracker-${today}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  document.getElementById('btnExport').addEventListener('click', exportCSV);

  // ── Init ─────────────────────────────────────────────────────────────────
  updateSortButtons();
  render();
  if (activities.some(a => a.running)) startTick();
</script>
</body>
</html>
